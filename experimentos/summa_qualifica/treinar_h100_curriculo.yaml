
# ==========================================================================
# CONFIGURAÇÃO DE TREINAMENTO - Qwen 2.5 1.5B (Curriculum Learning)
# ==========================================================================
# Ambiente: 2x H100 80GB (CUDA_VISIBLE_DEVICES="2,3")
# Modo: curriculum (fácil → médio → difícil → completo)
# ==========================================================================

#| =========================================================================
#| FORMATOS
#| =========================================================================
#| Configuração dos formatos de entrada e saída de dados.
formatos:
  tipo_entrada: curriculum
  formato_saida: json

#| =========================================================================
#| MISCELÂNEA
#| =========================================================================
#| Configurações diversas (logs, variáveis de ambiente).
misc:
  log_level: DEBUG
  env_chave_criptografia: CHAVE_CRIPT

#| =========================================================================
#| DATASET (PASTAS)
#| =========================================================================
#| Configuração para carregamento de dados via estrutura de pastas (arquivos txt/json).
#| Para tipo_entrada 'curriculum', as chaves predicao, dataset, entrada e validacao
#| são compartilhadas entre todas as etapas. A divisão vem da seção 'curriculum'.
pastas:
  predicao:
    #| Pasta onde serão gravadas as predições do modelo para avaliação (criada automaticamente)
    pasta: ./treino_simples/predict/ext_qwen1_5b_11
  dataset:
    #| Gold dataset: pasta com as saídas esperadas usadas como alvo no treino
    #| O nome do arquivo sem extensão é o ID ligado ao dataframe e ao arquivo de divisão
    pasta: ./saidas_fold11/ext_qwen235b_11
    mascara: "*.txt"
  entrada:
    #pasta: ./saidas/acordaos_raw
    #mascara: "*.txt"
    dataframe: ./summa_data/pecas_exportadas_textos.parquet
    dataframe_col: texto
    dataframe_id: id_peca
    prompt_template: './summa_data/prompt_summa_raw.txt'
    tag_texto: '<<--TEXTO-->>'
  divisao:
    arquivo: ./treino_simples/divisao_unica.csv
    validar_ids: false
    proporcao:
      - treino: 0.70
      - validacao: 0.10
      - teste: 0.20
    seed: 42
  validacao:
    exigir_json_valido: true
    skip_invalidos: false

#| =========================================================================
#| CURRICULUM
#| =========================================================================
#| Cada etapa corresponde a uma divisão do dataset com parâmetros de treino.
#| O campo 'arquivo' é o CSV de divisão (equivalente a pastas.divisao.arquivo).
curriculum:
  predicao:
    #| Pasta onde serão gravadas as predições do modelo para avaliação (criada automaticamente)
    pasta: ./treino_simples/predict/ext_qwen1_5b_11
  dataset:
    #| Gold dataset: pasta com as saídas esperadas usadas como alvo no treino
    #| O nome do arquivo sem extensão é o ID ligado ao dataframe e ao arquivo de divisão
    pasta: ./saidas_fold11/ext_qwen235b_11
    mascara: "*.txt"
  entrada:
    #pasta: ./saidas/acordaos_raw
    #mascara: "*.txt"
    dataframe: ./summa_data/pecas_exportadas_textos.parquet
    dataframe_col: texto
    dataframe_id: id_peca
    prompt_template: './summa_data/prompt_summa_raw.txt'
    tag_texto: '<<--TEXTO-->>'
  validacao:
    exigir_json_valido: true
    skip_invalidos: false
  divisao:
    - arquivo: ./treino_simples/divisao_facil.csv
      alias: "fácil"
      tipo: "lora"       # "full" ou "lora" (Se "lora", obedece configurações de `lora` raíz)
      pace_epochs: 2     # (Padrão) Transita após 1 época.
      max_seq_length: 30720  # [Opcional] Pode sobrepor config geral.
    - arquivo: ./treino_simples/divisao_medio.csv
      alias: "médio"
      tipo: "lora"
      pace_epochs: 2     # (Padrão) Transita após 1 época.
      max_seq_length: 32768  # [Opcional] Pode sobrepor config geral.
    - arquivo: ./treino_simples/divisao_dificil.csv
      alias: "difícil"
      tipo: "lora"
      pace_epochs: 2     # (Padrão) Transita após 1 época.
      max_seq_length: 35840  # [Opcional] Pode sobrepor config geral.
    - arquivo: ./treino_simples/divisao_unica.csv
      alias: "completo"
      tipo: "lora"
      pace_epochs: 2     # (Padrão) Transita após 1 época.
      max_seq_length: 35840  # [Opcional] Pode sobrepor config geral.

#| =========================================================================
#| DATASET (PARQUET)
#| =========================================================================
#| Configuração para carregamento de dados via arquivos parquet.
dataset:
  train_prompt_col: messages
  eval_prompt_col: ''
  train_file: ./saidas/ext_qwen235b_11_train.parquet
  eval_file: ./saidas/ext_qwen235b_11_eval.parquet
  test_file: ./saidas/ext_qwen235b_11_test.parquet

#| =========================================================================
#| MODELO
#| =========================================================================
#| Configurações do modelo base e diretório de saída.
modelo:
  # Modelo atual: Qwen 2.5 1.5B (suporta GPU de 12GB com 4-bit)
  #| Slug HuggingFace ou caminho local.
  #| [7B] Ex: Qwen/Qwen2.5-7B-Instruct (requer ~24GB VRAM em 4-bit)
  #base_model_name: Qwen/Qwen2.5-1.5B-Instruct
  #base_model_name: unsloth/Qwen2.5-1.5B-Instruct-unsloth-bnb-4bit
  #base_model_name: Qwen/Qwen2.5-3B-Instruct
  base_model_name: Qwen/Qwen2.5-7B-Instruct
  #| Diretório de saída para o adaptador LoRA.
  saida: ./treino_simples/Qwen2.5-7B-Instruct(curriculum)

#| =========================================================================
#| TREINAMENTO
#| =========================================================================
#| Configurações de hiperparâmetros. Defaults do Unsloth são otimizados.
#| Guia: https://unsloth.ai/docs/get-started/fine-tuning-llms-guide/lora-hyperparameters-guide
treinamento:
  #| Frequência de avaliação (ex: '15%' das steps ou número inteiro).
  eval_steps: 20%
  
  #| Amostras por GPU. Menor gasta menos VRAM.
  #| Para evitar OOM, use 1 ou 2 e aumente grad_batch_size.
  #| ⚠️ Com sequências longas (30k+), o tensor de logits (batch × seq × vocab × 4B)
  #|    é o maior consumidor de memória. Para Qwen2.5 (vocab=151936):
  #|    - batch=2, seq=35k → logits ≈ 43 GB (pode causar OOM)
  #|    - batch=1, seq=35k → logits ≈ 22 GB (seguro em H100 80GB)
  #| [H100] Com sequências longas: use 1. Com sequências curtas (<8k): pode usar 4-8.
  batch_size:
    efetivo: 16  # Batch efetivo (ajusta batch_size e grad_batch_size automaticamente)
    batch_size: 1  # Batch por GPU (deve ser verificado empiricamente para evitar OOM)
  #| Acumulação de gradiente. Aumenta tempo de treino mas economiza VRAM.
  #| Batch Efetivo = batch_size * grad_batch_size * num_gpus (Recomendado: 16-24).
  #| [H100] Com batch_size=1 e 2 GPUs: grad_batch_size=12 → efetivo = 1*12*2 = 24.
  grad_batch_size: 6
  # Batch efetivo: 2 * 8 * 2 GPUs = 32
  
  #| Passadas no dataset. Recomendado: 1-3 épocas.
  #| Mais que 3 pode causar overfitting (memorização) em instruct datasets.
  #| [H100] Mais poder = mais épocas viáveis; pode experimentar 5-10.
  num_train_epochs: 1
  
  #| Contexto máximo para truncagem de dados. NÃO altera a arquitetura do modelo.
  #| O modelo usa seu max_position_embeddings nativo (Qwen2.5 = 32768, com
  #| rope_theta=1e6 suportando até 131072 tokens via RoPE estendido).
  #| Este valor controla apenas o max_length do SFTTrainer (truncagem/padding).
  #| Em modo curriculum, cada etapa pode sobrepor este valor (ver curriculum.divisao).
  #| 0 = valor absoluto do máximo do dataset (ajuste automático).
  #| ⚠️ Com sequências longas, reduza batch_size para 1 e aumente grad_batch_size.
  max_seq_length: 4098
  
  #| Validação de tokens segura. Recomendado: true.
  #| Se `false` e o max_seq_length for > 0, o sistema confia na sua configuração
  #| e pula a contagem demorada de tokens para economizar tempo imediato de boot.
  validar_max_seq_length: true 
  
  #| Taxa de aprendizado. QLoRA/LoRA: start 2e-4. RL (DPO): 5e-6.
  #| Se overfitting/loss < 0.2: Reduzir. Se underfitting: Aumentar.
  #| [7B] Modelos maiores são mais sensíveis; force 1e-4.
  learning_rate: 0.0002  # = 2e-4
  
  save_checkpoints: true
  resume_from_checkpoint: true
  
  #| Passos de aquecimento. Recomendado: 5-10% do total de steps.
  #| [7B] Aumentar para 10-20 steps em modelos maiores.
  warmup_steps: 5
  
  #| Decaimento de peso (regularização). Padrão 0.01.
  weight_decay: 0.01
  
  #| Otimizador. Padrão Unsloth: 'adamw_8bit'.
  #| Outras opções: 'adamw_torch', 'paged_adamw_8bit'.
  optim: adamw_8bit
  
  #| Scheduler. 'linear': decaimento constante (estável).
  #| 'cosine': decaimento suave (melhor convergência final em >1 época).
  lr_scheduler_type: cosine
  
  seed: 3407
  
  #| Quantização: 4 (QLoRA) economiza muita memória. 16 (LoRA) para máxima precisão.
  #| [H100] Pode usar 8 ou 16 (Full Precision) para máxima qualidade.
  nbits: 4
  
  #| True: treina apenas nas respostas (recomendado para chat). Aumenta acurácia.
  train_on_responses_only: true

#| =========================================================================
#| LORA (Low-Rank Adaptation)
#| =========================================================================
#| Configurações do adaptador LoRA. QLoRA (4-bit) economiza 75% VRAM vs LoRA (16-bit).
lora:
  #| Rank: 8, 16, 32, 64, 128. Recomendado: 16 ou 32.
  #| Maior rank = mais capacidade, mas usa mais VRAM e pode overfitar.
  #| [H100] Com memória ampla, r=16 ou 32 oferece melhor qualidade.
  r: 16
  #| Alpha: Escala do ajuste. Recomendado: igual a r ou 2*r.
  #| Ex: r=16 -> alpha=32.
  alpha: 32   # ratio alpha/r = 2 (padrão recomendado)
  #| Regularização. Unsloth otimizado para 0, mas use 0.1 se notar overfitting.
  dropout: 0.05
  
  #| Módulos alvo. Recomendado: todos os lineares (q,k,v,o,gate,up,down) para melhor qualidade.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

