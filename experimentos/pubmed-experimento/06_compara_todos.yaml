# ==========================================================================
# Comparação: Panorama Completo (todos os protocolos)
# ==========================================================================
# Propósito: Visão global de todos os protocolos em um único relatório.
#   Inclui baselines (A, b, c), experimentais (d1-d4) e ablações (d5-d8).
# Executar com: python ../../src/comparar_extracoes.py --config 06_compara_todos.yaml
# ==========================================================================

# --- Miscelânea ---
misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
    - /opt/app-root/src/luiz/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl/llms/experimentos/pubmed-experimento

# Configuração Global de Saída
saida:
  pasta: "compara/analises_comparacao_pubmed_todos"
  pasta_parquet: "compara/"
  arquivo_base: "comparacao_pubmed(todos)"
  regerar_planilha_base: true
  linguagem_graficos: "en"

# Configurações de Execução
execucao:
  max_workers: 20
  teste_rapido: false
  gerar_graficos: true 
  llm_as_a_judge: false
  analise_estatistica: true
  ignorar_erro_extracao: false

# Modelo Base (Gabarito/Referência)
modelo_base:
  arquivo: "saidas/saida_pubmed_prof.parquet"
  rotulo: "Professor"
  familia: "PubMed-Gold"

# Modelos Comparados
modelos_comparacao:
  # --- Baseline A: zero-shot ---
  - arquivo: "saidas/saida_pubmed_1_5b.parquet"
    rotulo: "Qwen1.5B"
    familia: "Qwen-1.5B"
  # --- Baseline B: LoRA direto ---
  - arquivo: "saidas/saida_pubmed_1_5b(b)_teste.parquet"
    rotulo: "Qwen1.5B(b)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(b)"
  # --- Baseline C: FF direto ---
  - arquivo: "saidas/saida_pubmed_1_5b(c)_teste.parquet"
    rotulo: "Qwen1.5B(c)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(c)"
  # --- Experimental D1: CL por etapas, FF→LoRA ---
  - arquivo: "saidas/saida_pubmed_1_5b(d1)_teste.parquet"
    rotulo: "Qwen1.5B(d1)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d1)"
  # --- Experimental D2: CL por etapas, LoRA→FF ---
  - arquivo: "saidas/saida_pubmed_1_5b(d2)_teste.parquet"
    rotulo: "Qwen1.5B(d2)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d2)"
  # --- Experimental D3: CL acumulado, FF→LoRA ---
  - arquivo: "saidas/saida_pubmed_1_5b(d3)_teste.parquet"
    rotulo: "Qwen1.5B(d3)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d3)"
  # --- Experimental D4: CL acumulado, LoRA→FF ---
  - arquivo: "saidas/saida_pubmed_1_5b(d4)_teste.parquet"
    rotulo: "Qwen1.5B(d4)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d4)"
  # --- Ablação D5: Escalonamento FF→LoRA, sem CL ---
  - arquivo: "saidas/saida_pubmed_1_5b(d5)_teste.parquet"
    rotulo: "Qwen1.5B(d5)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d5)"
  # --- Ablação D6: Escalonamento LoRA→FF, sem CL ---
  - arquivo: "saidas/saida_pubmed_1_5b(d6)_teste.parquet"
    rotulo: "Qwen1.5B(d6)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d6)"
  # --- Ablação D7: CL por etapas, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d7)_teste.parquet"
    rotulo: "Qwen1.5B(d7)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d7)"
  # --- Ablação D8: CL acumulado, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d8)_teste.parquet"
    rotulo: "Qwen1.5B(d8)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d8)"

# Configuração das Métricas e Campos
configuracao_comparacao:
  padronizar_simbolos: true
  rouge_stemmer: true
  
  filtro:
    arquivo: "dados/pubmed-rct-20k.parquet"
    campo_id: "pmid"
    dataset_filtro: {"split": "test"}

  # Configuração do campo ID
  nome_campo_id: "id"  # Nome interno do campo de ID (usado em DataFrames, gráficos, etc)
  rotulo_campo_id: "ID"  # Rótulo de exibição do campo ID (usado em relatórios)
  
  # Configuração dos campos do parquet (quando a entrada for .parquet)
  campos_parquet:
    id: "chave"             # coluna com o ID do documento
    resposta: "resposta"    # coluna com o JSON da extração (será salvo como {id}.json)
    resumo_tokens: "resumo" # coluna com o JSON de tokens (será salvo como {id}.tokens.json)
    avaliacao: ""           # coluna com avaliação LLM (se disponível, salvo como {id}.avaliacao.json)
    erro: "erro"            # coluna com mensagem de erro (se disponível)

  # Modelos customizados (Opcional)
  modelos:
    # Tamanhos de mini-batch para otimização de memória no pré-cálculo (Padrão: 256)
    bertscore_batch_size: 1024
    sbert_batch_size: 1024

  # Máscaras de arquivos (Regex ou Sufixo)
  mascaras:
    extracao: "^(\\d+)\\.json$"
    tokens: ".tokens.json" 
    avaliacao: ".avaliacao.json"
    observabilidade: ".obs.json"

  # Mapeamento de campos para métricas
  campos:
    bertscore:
      - "(global)"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

    rouge_1:

    rouge_2:
      - "title"
      - "publication"
      - "journal"
      - "keywords"

    rouge_l:
      - "(global)"
      - "title"
      - "publication"
      - "journal"
      - "keywords"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"  

    levenshtein:
      - "publication"
      - "journal"

    sbert_grande:
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

campos_virtuais:
  Sentencas:
    - background
    - objective
    - methods
    - results
    - conclusions
  MetaDados:
    - title
    - publication
    - journal
    - keywords