# Executar com: python ../../src/treinar_unsloth.py --treinar 04_treinar_d10.yaml
# Executar com: python ../../src/treinar_unsloth.py --datasets 04_treinar_d10.yaml

# ==========================================================================
# CONFIGURAÇÃO DE TREINAMENTO - Qwen 2.5 1.5B (Protocolo D10)
# ==========================================================================
# Papel:   Ablação (efeito da ordem do currículo)
# Modo:    Anti-CL acumulado, LoRA-only
# Etapas:  LoRA-(>7) → LoRA-(>3) → LoRA-tudo
# Objetivo: Testar se a acumulação reversa (hard-first) prejudica o treino.
#           Espelho reverso de D8 para isolar o efeito da direção do CL.
# Pergunta: Q4 (a direção do currículo importa?)
# Comparar: d10 vs d8 (Q4 acumulado), d10 vs b (anti-CL vs baseline)
# Ambiente: H100 80GB (1 GPU via Slurm)
# ==========================================================================

#| =========================================================================
#| MISCELÂNEA
#| =========================================================================
#| Configurações diversas (logs, variáveis de ambiente).
misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
    - /opt/app-root/src/luiz/llms/experimentos/pubmed-experimento
  pastas_modelos:  
    - /students/luiz.abatitucci/models
    - /mnt/d/wsl_ollama/hf-models
    - /opt/app-root/src/luiz/llms/_models


#| =========================================================================
#| CURRICULUM
#| =========================================================================
curriculum:
  #| Saida: Especifica o "Gold Dataset", ou seja, os resultados esperados no gabarito
  saida:
    dataframe: saidas/saida_pubmed_prof.parquet
    dataframe_col: resposta
    dataframe_id: chave
    formato: json
    texto_criptografado: false

  #| Entrada: Especifica os dados que o modelo vai receber como prompt
  entrada:
    dataframe: dados/pubmed-rct-20k.parquet
    dataframe_col: article
    dataframe_id: pmid
    prompt_template: dados/prompt_pubmed_rct.txt
    tag_texto: '<<--TEXTO-->>'
    texto_criptografado: false
    prompt_criptografado: false

  validacao:
    exigir_json_valido: true
    exigir_ids_pareados: false

  #| Divisao: Define as etapas do treinamento (o currículo em si)
  #| Anti-CL acumulado LoRA-only: >7 → >3 → tudo (acumulando dados mais fáceis)
  divisao:
  - arquivo: compara/analises_comparacao_pubmed (full)/divisoes/divisao_Professor_Qwen1_5B.csv
    dataset_filtro: {"dificuldade_int": ">7"}
    alias: "difícil"
    tipo: "lora"
    pace_epochs: 4
  - arquivo: compara/analises_comparacao_pubmed (full)/divisoes/divisao_Professor_Qwen1_5B.csv
    dataset_filtro: {"dificuldade_int": ">3"}
    alias: "médio-ac"
    tipo: "lora"
    pace_epochs: 4
  - arquivo: compara/analises_comparacao_pubmed (full)/divisoes/divisao_Professor_Qwen1_5B.csv
    alias: "completo"
    tipo: "lora"
    pace_epochs: 4

#| =========================================================================
#| MODELO
#| =========================================================================
modelo:
  base_model_name: Qwen2.5-1.5B-Instruct
  saida: treinos/Qwen2.5-1.5B-Instruct(d10)
  ollama: Qwen2.5-1.5B-Instruct(d10):latest
  ollama_base: qwen2.5:1.5b
  ollama_url:

#| =========================================================================
#| TREINAMENTO
#| =========================================================================
treinamento:
  flash_attention_2: true
  liger_kernel: true
  full_com_sdpa: true

  eval_steps: 20%

  batch_size:
    efetivo: 16
    batch_size: 2
  grad_batch_size: 8

  num_train_epochs: 4
  max_seq_length: 8192
  validar_max_seq_length: true

  learning_rate: 2e-05
  max_grad_norm: 1
  save_checkpoints: true
  resume_from_checkpoint: true
  warmup_steps: 5
  weight_decay: 0.01
  optim: adamw_8bit

  lr_scheduler_type: cosine
  seed: 3407

  nbits: 4

  train_on_responses_only: true

#| =========================================================================
#| LORA (Low-Rank Adaptation)
#| =========================================================================
#| Configura a técnica de Parameter-Efficient Fine-Tuning.
lora:
  #| Dimensão da atualização de pesos. 16 é um bom balanço entre capacidade e memória.
  r: 16
  #| Fator de escala, geralmente o dobro do rank.
  alpha: 32
  dropout: 0.05

  #| Conecta os adaptadores em todas as projeções lineares para melhorar a expressividade.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
