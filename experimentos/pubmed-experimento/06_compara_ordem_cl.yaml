# ==========================================================================
# Comparação: Efeito da Ordem do Currículo (Q4)
# ==========================================================================
# Propósito: Responder Q4 — A direção do currículo importa?
#   Compara CL (fácil→difícil) vs anti-CL (difícil→fácil), ambos LoRA-only.
#   Comparações-chave:
#     d7 vs d9 → Efeito da ordem no pacing por etapas
#     d8 vs d10 → Efeito da ordem no pacing acumulado
#     d7/d8 vs b → CL melhora sobre baseline?
#     d9/d10 vs b → Anti-CL melhora sobre baseline?
# Modelos: A (baseline), b (LoRA), d7 (CL etapas), d8 (CL acum), d9 (anti-CL etapas), d10 (anti-CL acum)
# Executar com: python ../../src/comparar_extracoes.py --config 06_compara_ordem_cl.yaml
# ==========================================================================

# --- Miscelânea ---
misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
    - /opt/app-root/src/luiz/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl/llms/experimentos/pubmed-experimento

# Configuração Global de Saída
saida:
  pasta: "compara/analises_comparacao_pubmed_ordem_cl"
  pasta_parquet: "compara/"
  arquivo_base: "comparacao_pubmed(ordem_cl)"
  regerar_planilha_base: true
  linguagem_graficos: "en"

# Configurações de Execução
execucao:
  max_workers: 20
  teste_rapido: false
  gerar_graficos: true 
  llm_as_a_judge: false
  analise_estatistica: true
  ignorar_erro_extracao: false

# Modelo Base (Gabarito/Referência)
modelo_base:
  arquivo: "saidas/saida_pubmed_prof.parquet"
  rotulo: "Professor"
  familia: "PubMed-Gold"

# Modelos Comparados
modelos_comparacao:
  # --- Baseline A: zero-shot ---
  - arquivo: "saidas/saida_pubmed_1_5b.parquet"
    rotulo: "Qwen1.5B"
    familia: "Qwen-1.5B"
  # --- Baseline B: LoRA direto ---
  - arquivo: "saidas/saida_pubmed_1_5b(b)_teste.parquet"
    rotulo: "Qwen1.5B(b)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(b)"
  # --- D7: CL por etapas, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d7)_teste.parquet"
    rotulo: "Qwen1.5B(d7)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d7)"
  # --- D8: CL acumulado, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d8)_teste.parquet"
    rotulo: "Qwen1.5B(d8)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d8)"
  # --- D9: Anti-CL por etapas, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d9)_teste.parquet"
    rotulo: "Qwen1.5B(d9)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d9)"
  # --- D10: Anti-CL acumulado, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d10)_teste.parquet"
    rotulo: "Qwen1.5B(d10)"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d10)"

# Configuração das Métricas e Campos
configuracao_comparacao:
  padronizar_simbolos: true
  rouge_stemmer: true
  
  filtro:
    arquivo: "dados/pubmed-rct-20k.parquet"
    campo_id: "pmid"
    dataset_filtro: {"split": "test"}

  nome_campo_id: "id"
  rotulo_campo_id: "ID"
  
  campos_parquet:
    id: "chave"
    resposta: "resposta"
    resumo_tokens: "resumo"
    avaliacao: ""
    erro: "erro"

  modelos:
    bertscore_batch_size: 1024
    sbert_batch_size: 1024

  mascaras:
    extracao: "^(\\d+)\\.json$"
    tokens: ".tokens.json" 
    avaliacao: ".avaliacao.json"
    observabilidade: ".obs.json"

  campos:
    bertscore:
      - "(global)"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

    rouge_1:

    rouge_2:
      - "title"
      - "publication"
      - "journal"
      - "keywords"

    rouge_l:
      - "(global)"
      - "title"
      - "publication"
      - "journal"
      - "keywords"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"  

    levenshtein:
      - "publication"
      - "journal"

    sbert_grande:
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

campos_virtuais:
  Sentencas:
    - background
    - objective
    - methods
    - results
    - conclusions
  MetaDados:
    - title
    - publication
    - journal
    - keywords
