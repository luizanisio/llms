# Executar com: python ../../src/treinar_unsloth.py --treinar 04_treinar_d_mini_ff_lora.yaml

# ==========================================================================
# CONFIGURAÇÃO DE TREINAMENTO - Qwen 2.5 1.5B (Teste Curriculum Misto)
# ==========================================================================
# Ambiente: H100 80GB (1 GPU via Slurm)
# Modo: curriculum (etapas mistas: Full -> LoRA)
# ==========================================================================

#| =========================================================================
#| MISCELÂNEA
#| =========================================================================
misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
  pastas_modelos:  
    - /students/luiz.abatitucci/models
    - /mnt/d/wsl_ollama/hf-models

#| =========================================================================
#| CURRICULUM
#| =========================================================================
curriculum:
  saida:
    dataframe: saidas/saida_pubmed_prof.parquet
    dataframe_col: resposta
    dataframe_id: chave
    formato: json
    texto_criptografado: false
  
  entrada:
    dataframe: dados/pubmed-rct-20k.parquet
    dataframe_col: article
    dataframe_id: pmid
    prompt_template: dados/prompt_pubmed_rct.txt
    tag_texto: '<<--TEXTO-->>'
    texto_criptografado: false
    prompt_criptografado: false
  
  validacao:
    exigir_json_valido: true
    exigir_ids_pareados: false
  
  divisao:
    #| 1ª Divisão: Treinamento FULL (Forçará nbits=16)
    - arquivo: compara/analises_comparacao_pubmed (full)/divisoes/divisao_Professor_Qwen1_5B.csv
      dataset_filtro: {"dificuldade": "facil"}
      alias: "fácil-FF"
      tipo: "full"
      pace_epochs: 1
      batch_size: 1
      # max_seq_length: 8192
      
    #| 2ª Divisão: Treinamento LORA (Retornará ao nbits global=4)
    - arquivo: compara/analises_comparacao_pubmed (full)/divisoes/divisao_Professor_Qwen1_5B.csv
      dataset_filtro: {"dificuldade": "medio"}
      alias: "médio"
      tipo: "lora"
      pace_epochs: 1
      # max_seq_length: 8192

#| =========================================================================
#| MODELO
#| =========================================================================
modelo:
  base_model_name: Qwen2.5-1.5B-Instruct
  saida: treinos/Qwen2.5-1.5B-Instruct(d-mini)
  ollama: Qwen2.5-1.5B-Instruct(d-mini):latest
  ollama_base: qwen2.5:1.5b

#| =========================================================================
#| TREINAMENTO
#| =========================================================================
treinamento:
  flash_attention_2: true   # Atenção O(n) em VRAM em vez de O(n²)
  liger_kernel: true        # Fused cross-entropy, RoPE, RMSNorm (~40% menos pico de VRAM)

  eval_steps: 20%
  
  batch_size:
    efetivo: 16
    batch_size: 2
  grad_batch_size: 8
  
  num_train_epochs: 2
  max_seq_length: 8192
  validar_max_seq_length: true 
  
  learning_rate: 0.00002
  save_checkpoints: true
  resume_from_checkpoint: true
  warmup_steps: 5
  weight_decay: 0.01
  optim: adamw_8bit
  
  lr_scheduler_type: cosine
  seed: 3407
  
  #| Quantização global do YAML (será ignorada temporariamente pela etapa "full")
  nbits: 4
  
  train_on_responses_only: true
