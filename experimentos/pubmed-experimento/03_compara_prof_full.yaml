# Configuração para comparação de extrações - Experimento PubMed 
# Executar com: python ../../src/comparar_extracoes.py --config 03_compara_prof_full.yaml
# Zipar e apagar a pasta: zip -r "analises_comparacao_pubmed (full).zip" "analises_comparacao_pubmed (full)"
#                         rm -rf "analises_comparacao_pubmed (full)"

misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
    - /opt/app-root/src/luiz/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl/llms/experimentos/pubmed-experimento

# Configuração Global de Saída
saida:
  pasta: "compara/analises_comparacao_pubmed (full)"
  pasta_parquet: "compara/"
  arquivo_base: "comparacao_pubmed"
  regerar_planilha_base: true # Se false, não regera a planilha se ela já existir
  linguagem_graficos: "en" # pt ou en para as legendas dos gráficos

# Configurações de Execução
execucao:
  max_workers: 20
  teste_rapido: false # Defina como true para pular métricas pesadas (BERTScore)
  llm_as_a_judge: false
  ignorar_erro_extracao: true
  
  # =========================================================================
  # CONFIGURAÇÃO DE DIVISÃO
  # =========================================================================
  # A propriedade `arquivo_referencia`é opcional e indica um gabarito prévio
  # dos alvos treino/teste/validaçao. 
  # Caso não exista, o script irá criar um.
  # Este arquivo DEVE conter as colunas mapeadas de 
  # id e a coluna "alvo" definindo o que é treino, validacao e teste.
  # 
  # COMO A DIVISÃO É FEITA:
  # O script irá computar a "dificuldade" das predições do Professor, e ao
  # gerar o CSV final, fará um merge dessa dificuldade com o `arquivo_referencia`,
  # mantendo a integridade da divisão original e evitando data leakage.
  # =========================================================================
  divisao:
    arquivo_referencia: "dados/divisao_pubmed.csv"

# Modelo Base (Gabarito/Referência)
modelo_base:
  arquivo: "saidas/saida_pubmed_prof.parquet"
  rotulo: "Professor"
  familia: "PubMed-Gold"

# Modelos Comparados
modelos_comparacao:
  - arquivo: "saidas/saida_pubmed_1_5b.parquet"
    rotulo: "Qwen1.5B"
    familia: "Qwen-1.5B"

# Configuração das Métricas e Campos
configuracao_comparacao:
  padronizar_simbolos: true
  rouge_stemmer: true
  
  # Configuração do campo ID
  nome_campo_id: "id"  # Nome interno do campo de ID (usado em DataFrames, gráficos, etc)
  rotulo_campo_id: "ID"  # Rótulo de exibição do campo ID (usado em relatórios)
  
  # Configuração dos campos do parquet (quando a entrada for .parquet)
  # Mapeia os nomes das colunas do arquivo parquet para os dados esperados pelo pipeline.
  # Campos obrigatórios: id, resposta. Campos opcionais: resumo_tokens, avaliacao, erro.
  campos_parquet:
    id: "chave"             # coluna com o ID do documento
    resposta: "resposta"    # coluna com o JSON da extração (será salvo como {id}.json)
    resumo_tokens: "resumo" # coluna com o JSON de tokens (será salvo como {id}.tokens.json)
    avaliacao: ""           # coluna com avaliação LLM (se disponível, salvo como {id}.avaliacao.json)
    erro: "erro"            # coluna com mensagem de erro (se disponível)
  
  # carrega a lista de campo_id e filtra o parquet ou os ids das extrações antes de fazer a comparação
  # serve para análises de subconjuntos da base ou testes
  # filtro: 
  #   #arquivo: "./saida/filtro_teste_fold_12.csv"
  #   arquivo: "./saida/filtro_teste_fold_12_100_teste.csv"
  #   campo_id: "seq_documento_acordao"     

  # Modelos customizados (Opcional)
  # (Opcional) Sobrescrita de modelos HF para SBERT e BERTScore
  modelos:
    #sbert:
    #  medio: "stjiris/bert-large-portuguese-cased-legal-mlm-mkd-nli-sts-v1"
    #bertscore: "stjiris/bert-large-portuguese-cased-legal-mlm-mkd-nli-sts-v1"    # Ex: BERTScore personalizado modelo STJ de Portugual      
    # Tamanhos de mini-batch para otimização de memória no pré-cálculo (Padrão: 256)
    bertscore_batch_size: 1024
    sbert_batch_size: 1024

  # Máscaras de arquivos (Regex ou Sufixo)
  # Se começar com '^', é tratado como Regex.
  # Se não, é tratado como sufixo e o script adiciona '^(.+)' antes e escape no sufixo.
  mascaras:
    extracao: "^(.+)\\.json$"
    tokens: ".tokens.json" 
    avaliacao: ".avaliacao.json"
    observabilidade: ".obs.json"

  # Configuração das análises estatísticas (Friedman, Wilcoxon, Nemenyi, etc.)
  campos_estatisticas:
    campos:
      - "(global)"
      - "Sentencas"
      - "MetaDados"
    metricas:
      - bertscore
      - rouge_l
      - sbert_grande

  # Mapeamento de campos para métricas
  campos:
    bertscore:
      - "(global)"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

    rouge_1:

    rouge_2:
      - "title"
      - "publication"
      - "journal"
      - "keywords"

    rouge_l:
      - "title"
      - "publication"
      - "journal"
      - "keywords"

    levenshtein:
      - "publication"
      - "journal"

    sbert_grande:
      - "(global)"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

campos_virtuais:
  Sentencas:
    - background
    - objective
    - methods
    - results
    - conclusions
  MetaDados:
    - title
    - publication
    - journal
    - keywords