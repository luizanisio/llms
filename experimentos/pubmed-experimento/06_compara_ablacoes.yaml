# ==========================================================================
# Comparação: Ablações (decomposição dos componentes do framework)
# ==========================================================================
# Propósito: Isolar a contribuição de cada componente do framework CL+PT.
#   - d5, d6: Escalonamento sem CL (isola contribuição do escalonamento)
#   - d7, d8: CL sem escalonamento (isola contribuição do CL)
#   Comparações-chave:
#     d7 vs b → CL puro melhora sobre FT direto?
#     d5/d6 vs c → Escalonamento sem CL melhora sobre FF direto?
#     d7 vs d8 → Pace por etapas vs acumulado (sem escalonamento)
#     d5 vs d6 → Direção do escalonamento sem CL
# Modelos: A (baseline), b (LoRA), c (FF), d5-d8 (ablações)
# Executar com: python ../../src/comparar_extracoes.py --config 06_compara_ablacoes.yaml
# ==========================================================================

# --- Miscelânea ---
misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl_dev/llms/experimentos/pubmed-experimento
    - /opt/app-root/src/luiz/llms/experimentos/pubmed-experimento
    - /mnt/d/wsl/llms/experimentos/pubmed-experimento

# Configuração Global de Saída
saida:
  pasta: "compara/analises_comparacao_pubmed_ablacoes"
  pasta_parquet: "compara/"
  arquivo_base: "comparacao_pubmed(ablacoes)"
  regerar_planilha_base: true
  linguagem_graficos: "en"

# Configurações de Execução
execucao:
  max_workers: 20
  teste_rapido: false
  gerar_graficos: true 
  llm_as_a_judge: false
  analise_estatistica: true
  ignorar_erro_extracao: false

# Modelo Base (Gabarito/Referência)
modelo_base:
  arquivo: "saidas/saida_pubmed_prof.parquet"
  rotulo: "Professor"
  familia: "PubMed-Gold"

# Modelos Comparados
modelos_comparacao:
  # --- Baseline A: zero-shot ---
  - arquivo: "saidas/saida_pubmed_1_5b.parquet"
    rotulo: "Qwen1.5B"
    alias: "A"
    familia: "Qwen-1.5B"
    baseline: true
  # --- Baseline B: LoRA direto ---
  - arquivo: "saidas/saida_pubmed_1_5b(b)_teste.parquet"
    rotulo: "Qwen1.5B(b)"
    alias: "B"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(b)"
  # --- Baseline C: FF direto ---
  - arquivo: "saidas/saida_pubmed_1_5b(c)_teste.parquet"
    rotulo: "Qwen1.5B(c)"
    alias: "C"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(c)"
  # --- Ablação D5: Escalonamento FF→LoRA, sem CL ---
  - arquivo: "saidas/saida_pubmed_1_5b(d5)_teste.parquet"
    rotulo: "Qwen1.5B(d5)"
    alias: "D5"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d5)"
  # --- Ablação D6: Escalonamento LoRA→FF, sem CL ---
  - arquivo: "saidas/saida_pubmed_1_5b(d6)_teste.parquet"
    rotulo: "Qwen1.5B(d6)"
    alias: "D6"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d6)"
  # --- Ablação D7: CL por etapas, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d7)_teste.parquet"
    rotulo: "Qwen1.5B(d7)"
    alias: "D7"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d7)"
  # --- Ablação D8: CL acumulado, LoRA-only ---
  - arquivo: "saidas/saida_pubmed_1_5b(d8)_teste.parquet"
    rotulo: "Qwen1.5B(d8)"
    alias: "D8"
    familia: "Qwen-1.5B"
    pasta_treinamento: "treinos/Qwen2.5-1.5B-Instruct(d8)"

# Configuração das Métricas e Campos
configuracao_comparacao:
  padronizar_simbolos: true
  rouge_stemmer: true
  
  filtro:
    arquivo: "dados/pubmed-rct-20k.parquet"
    campo_id: "pmid"
    dataset_filtro: {"split": "test"}

  nome_campo_id: "id"
  rotulo_campo_id: "ID"
  
  campos_parquet:
    id: "chave"
    resposta: "resposta"
    resumo_tokens: "resumo"
    avaliacao: ""
    erro: "erro"

  modelos:
    bertscore_batch_size: 1024
    sbert_batch_size: 1024

  mascaras:
    extracao: "^(\\d+)\\.json$"
    tokens: ".tokens.json" 
    avaliacao: ".avaliacao.json"
    observabilidade: ".obs.json"

  campos:
    bertscore:
      - "(global)"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

    rouge_1:

    rouge_2:
      - "title"
      - "publication"
      - "journal"
      - "keywords"

    rouge_l:
      - "(global)"
      - "title"
      - "publication"
      - "journal"
      - "keywords"
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"  

    levenshtein:
      - "publication"
      - "journal"

    sbert_grande:
      - "background"
      - "objective"
      - "methods"
      - "results"
      - "conclusions"
      - "Sentencas"
      - "MetaDados"

campos_virtuais:
  Sentencas:
    - background
    - objective
    - methods
    - results
    - conclusions
  MetaDados:
    - title
    - publication
    - journal
    - keywords
