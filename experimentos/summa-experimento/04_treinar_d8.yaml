# Executar com: python ../../src/treinar_unsloth.py --treinar 04_treinar_d8.yaml
# Executar com: python ../../src/treinar_unsloth.py --datasets 04_treinar_d8.yaml

# ==========================================================================
# CONFIGURAÇÃO DE TREINAMENTO - Qwen2.5-7B-Instruct (Protocolo D8)
# ==========================================================================
# Papel:   Ablação (CL sem escalonamento)
# Modo:    CL acumulado, LoRA-only
# Etapas:  LoRA-(≤3) → LoRA-(≤7) → LoRA-tudo
# Pergunta: Q2 (CL acumulado melhora sobre FT direto?)
# Comparar: d8 vs b (CL acum), d8 vs d7 (acum vs etapas), d8 vs d10 (Q4 direção)
# Ambiente: H100 80GB (1 GPU via Slurm)
# ==========================================================================

misc:
  pastas_base: 
    - /students/luiz.abatitucci/llms/experimentos/summa-experimento
    - /mnt/d/wsl_dev/llms/experimentos/summa-experimento
    - /opt/app-root/src/luiz/llms/experimentos/summa-experimento
  pastas_modelos:  
    - /students/luiz.abatitucci/models
    - /mnt/d/wsl_ollama/hf-models
    - /opt/app-root/src/luiz/llms/_models

curriculum:
  saida:
    dataframe: saida/saida_or_235b.parquet
    dataframe_col: resposta
    dataframe_id: chave
    formato: json
    texto_criptografado: false

  entrada:
    dataframe: dados/integras_experimento_summa_novos.parquet
    dataset_filtro: {"fold": "<=10"}
    dataframe_col: integra
    dataframe_id: seq_documento_acordao
    prompt_template: dados/prompt_summa_raw.txt
    tag_texto: '<<--TEXTO-->>'
    texto_criptografado: false
    prompt_criptografado: false

  validacao:
    exigir_json_valido: true
    exigir_ids_pareados: false

  #| CL acumulado LoRA-only: ≤3 → ≤7 → tudo
  divisao:
  - arquivo: compara/analises_comparacao_summa_q235 (full-base)/divisoes/divisao_Qwen235b_Qwen7b.csv
    dataset_filtro: {"dificuldade_int": "<=3"}
    alias: "fácil"
    tipo: "lora"
    pace_epochs: 4
  - arquivo: compara/analises_comparacao_summa_q235 (full-base)/divisoes/divisao_Qwen235b_Qwen7b.csv
    dataset_filtro: {"dificuldade_int": "<=7"}
    alias: "médio-ac"
    tipo: "lora"
    pace_epochs: 4
  - arquivo: compara/analises_comparacao_summa_q235 (full-base)/divisoes/divisao_Qwen235b_Qwen7b.csv
    alias: "completo"
    tipo: "lora"
    pace_epochs: 4

modelo:
  base_model_name: Qwen2.5-7B-Instruct
  saida: treinos/Qwen2.5-7B-Instruct(d8)
  ollama: Qwen2.5-7B-Instruct(d8):latest
  ollama_base: qwen2.5:7b
  ollama_url:

treinamento:
  flash_attention_2: true
  full_com_sdpa: true
  liger_kernel: true
  eval_steps: 20%
  batch_size:
    efetivo: 16
    batch_size: 1
  grad_batch_size: 8
  num_train_epochs: 4
  max_seq_length: 32768
  validar_max_seq_length: true
  filtrar_max_seq_length: true
  learning_rate: 2e-05
  save_checkpoints: true
  resume_from_checkpoint: true
  warmup_steps: 5
  weight_decay: 0.01
  optim: adamw_8bit
  lr_scheduler_type: cosine
  seed: 3407
  nbits: 4
  train_on_responses_only: true

#| =========================================================================
#| LORA (Low-Rank Adaptation)
#| =========================================================================
#| Configura a técnica de Parameter-Efficient Fine-Tuning.
lora:
  #| Dimensão da atualização de pesos. 16 é um bom balanço entre capacidade e memória.
  r: 16
  #| Fator de escala, geralmente o dobro do rank.
  alpha: 32
  dropout: 0.05

  #| Conecta os adaptadores em todas as projeções lineares para melhorar a expressividade.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
